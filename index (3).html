<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qaseer - Smart Link Shortener</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- QR Code Library (Simple lightweight lib for browser) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Tajawal', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Tajawal', sans-serif;
        background-color: #f8fafc;
      }
      /* Custom Animations */
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "qrcode.react": "https://esm.sh/qrcode.react@^4.2.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>

    <!-- MAIN APPLICATION SCRIPT -->
    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback } = React;

      // --- Icons (Inline SVGs to avoid external dependencies) ---
      const Icons = {
        Link2: ({ size = 24, className = "" }) => (
          <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 17H7A5 5 0 0 1 7 7h2"></path><path d="M15 7h2a5 5 0 1 1 0 10h-2"></path><line x1="8" y1="12" x2="16" y2="12"></line></svg>
        ),
        Wand2: ({ size = 24, className = "" }) => (
          <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></svg>
        ),
        Loader2: ({ size = 24, className = "" }) => (
          <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56" /></svg>
        ),
        QrCode: ({ size = 24, className = "" }) => (
          <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="5" height="5" x="3" y="3" rx="1" /><rect width="5" height="5" x="16" y="3" rx="1" /><rect width="5" height="5" x="3" y="16" rx="1" /><path d="M21 16h-3a2 2 0 0 0-2 2v3" /><path d="M21 21v.01" /><path d="M12 7v3a2 2 0 0 1-2 2H7" /><path d="M3 12h.01" /><path d="M12 3h.01" /><path d="M12 16v.01" /><path d="M16 12h1" /><path d="M21 12v.01" /><path d="M12 21v-1" /></svg>
        ),
        RefreshCw: ({ size = 24, className = "" }) => (
          <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" /><path d="M8 16H3v5" /></svg>
        ),
        Download: ({ size = 24, className = "" }) => (
          <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        ),
        Copy: ({ size = 24, className = "" }) => (
          <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        )
      };

      // --- Service Logic ---
      const shortenUrl = async (url) => {
        // Strategy 1: Spoo.me
        try {
          const formData = new URLSearchParams();
          formData.append('url', url);
          const response = await fetch('https://spoo.me/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
            body: formData,
          });
          if (response.ok) {
            const data = await response.json();
            if (data.short_url) return data.short_url;
          }
        } catch (e) { console.warn('Spoo.me failed'); }

        // Strategy 2: GoTiny.cc
        try {
          const response = await fetch('https://gotiny.cc/api', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ input: url }),
          });
          if (response.ok) {
            const data = await response.json();
            if (data && Array.isArray(data) && data[0]?.code) return `https://gotiny.cc/${data[0].code}`;
          }
        } catch (e) { console.warn('GoTiny failed'); }

        // Strategy 3: TinyURL
        try {
          const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(url)}`);
          if (response.ok) {
            const text = await response.text();
            if (text.startsWith('http')) return text;
          }
        } catch (e) { console.warn('TinyURL failed'); }

        return url; // Fallback to original
      };

      // --- Components ---
      
      const QrCard = ({ data }) => {
        const canvasRef = useRef(null);
        
        // Generate QR using QRious
        useEffect(() => {
          if (canvasRef.current) {
            new QRious({
              element: canvasRef.current,
              value: data.shortUrl,
              size: 200,
              level: 'H',
              background: 'white',
              foreground: 'black'
            });
          }
        }, [data.shortUrl]);

        const handleDownload = () => {
          const canvas = canvasRef.current;
          if (canvas) {
            const pngUrl = canvas.toDataURL("image/png");
            const downloadLink = document.createElement("a");
            downloadLink.href = pngUrl;
            downloadLink.download = `qr-code-${Date.now()}.png`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
          }
        };

        const handleCopy = () => {
          navigator.clipboard.writeText(data.shortUrl);
          alert('تم نسخ الرابط المختصر!');
        };

        return (
          <div className="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 animate-fade-in">
            <div className="bg-brand-50 p-6 border-b border-brand-100 flex justify-center">
              <h3 className="text-brand-800 font-bold text-lg">تم إنشاء الرمز بنجاح</h3>
            </div>
            <div className="p-8 flex flex-col items-center justify-center bg-white relative">
              <div className="p-4 bg-white border-2 border-gray-100 rounded-2xl shadow-sm">
                <canvas ref={canvasRef}></canvas>
              </div>
              <p className="mt-4 text-xs text-gray-400 font-mono text-center break-all px-4 select-all">
                {data.shortUrl}
              </p>
            </div>
            <div className="grid grid-cols-2 gap-px bg-gray-100 border-t border-gray-100">
              <button onClick={handleDownload} className="flex items-center justify-center gap-2 bg-white p-4 text-sm font-semibold text-gray-700 hover:bg-gray-50 hover:text-brand-600 transition-colors">
                <Icons.Download size={18} /> <span>حفظ QR</span>
              </button>
              <button onClick={handleCopy} className="flex items-center justify-center gap-2 bg-white p-4 text-sm font-semibold text-gray-700 hover:bg-gray-50 hover:text-brand-600 transition-colors">
                <Icons.Copy size={18} /> <span>نسخ الرابط</span>
              </button>
            </div>
          </div>
        );
      };

      const App = () => {
        const [urlInput, setUrlInput] = useState('');
        const [loading, setLoading] = useState(false);
        const [result, setResult] = useState(null);
        const [error, setError] = useState(false);

        const handleSubmit = useCallback(async (e) => {
          e.preventDefault();
          if (!urlInput.trim()) return;

          let validUrl = urlInput.trim();
          if (!validUrl.match(/^https?:\/\//)) {
            validUrl = 'https://' + validUrl;
          }

          setLoading(true);
          setResult(null);
          setError(false);

          try {
            const short = await shortenUrl(validUrl);
            setResult({
              originalUrl: validUrl,
              shortUrl: short,
              createdAt: Date.now()
            });
          } catch (error) {
            console.error(error);
            setError(true);
          } finally {
            setLoading(false);
          }
        }, [urlInput]);

        const handleReset = () => {
          setUrlInput('');
          setResult(null);
        };

        return (
          <div className="min-h-screen bg-gradient-to-br from-brand-50 via-white to-slate-50 text-gray-800 pb-20">
            {/* Navbar */}
            <nav className="w-full p-6 flex items-center justify-between">
              <div className="flex items-center gap-2 text-brand-700">
                <div className="p-2 bg-brand-100 rounded-lg">
                  <Icons.QrCode size={24} />
                </div>
                <span className="text-xl font-bold tracking-tight">قصير | Qaseer</span>
              </div>
            </nav>

            <main className="container mx-auto px-4 mt-8 flex flex-col items-center">
              {/* Hero */}
              <div className="text-center max-w-2xl mb-10">
                <h1 className="text-4xl md:text-5xl font-extrabold text-gray-900 mb-4 leading-tight">
                  اختصر روابطك، <br/>
                  <span className="text-brand-600">وأنشئ رمز QR فورياً</span>
                </h1>
                <p className="text-gray-500 text-lg">
                  أداة سريعة وبسيطة في ملف واحد، تعمل مباشرة على المتصفح.
                </p>
              </div>

              {/* Input Form */}
              {!result && (
                <div className="w-full max-w-xl relative z-10 animate-fade-in">
                  <form onSubmit={handleSubmit} className="relative group">
                    <div className="absolute -inset-1 bg-gradient-to-r from-brand-500 to-indigo-500 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
                    <div className="relative bg-white rounded-2xl shadow-xl p-2 flex items-center gap-2">
                      <div className="pl-4 pr-3 text-gray-400">
                        <Icons.Link2 size={20} />
                      </div>
                      <input
                        type="text"
                        value={urlInput}
                        onChange={(e) => setUrlInput(e.target.value)}
                        placeholder="ضع الرابط الطويل هنا..."
                        className="flex-1 p-3 bg-transparent outline-none text-gray-700 placeholder-gray-400 text-lg dir-ltr text-right"
                        disabled={loading}
                      />
                      <button
                        type="submit"
                        disabled={loading || !urlInput}
                        className="bg-gray-900 hover:bg-black text-white px-6 py-3 rounded-xl font-semibold flex items-center gap-2 transition-transform active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed"
                      >
                        {loading ? (
                          <>
                            <Icons.Loader2 size={20} className="animate-spin" />
                            <span>جاري...</span>
                          </>
                        ) : (
                          <>
                            <Icons.Wand2 size={20} />
                            <span>اختصار</span>
                          </>
                        )}
                      </button>
                    </div>
                  </form>
                  {error && (
                    <div className="mt-4 p-4 bg-red-50 text-red-600 rounded-xl text-center border border-red-100">
                      حدث خطأ أثناء معالجة الرابط.
                    </div>
                  )}
                </div>
              )}

              {/* Result */}
              {result && (
                <div className="animate-fade-in w-full flex flex-col items-center gap-8">
                  <QrCard data={result} />
                  <button 
                    onClick={handleReset}
                    className="group flex items-center gap-2 px-8 py-3 bg-white border border-gray-200 shadow-sm rounded-full text-gray-600 hover:text-brand-600 hover:border-brand-200 hover:shadow-md hover:bg-brand-50 transition-all duration-300 transform hover:-translate-y-1"
                  >
                    <Icons.RefreshCw size={18} className="group-hover:rotate-180 transition-transform duration-700" />
                    <span className="font-semibold">اختصار رابط جديد</span>
                  </button>
                </div>
              )}
            </main>

            <footer className="fixed bottom-0 w-full p-4 text-center text-gray-400 text-sm bg-white/80 backdrop-blur-md border-t border-gray-100">
              ملف واحد HTML يعمل بدون خادم
            </footer>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
